# 标准模式叠加文件：PostgreSQL + Redis
#
# 使用方式：
#   docker compose -f docker-compose.yml -f docker-compose.standard.yml up -d
#
# 适合：
#   多用户、第三方 Emby 客户端频繁刷新、媒体列表/首页访问较多的 NAS。

services:
  mediastation-go:
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Redis 只做热缓存，源数据仍在 PostgreSQL；Redis 丢失可自动重建。
      MEDIASTATION_CACHE_REDIS_URL: redis://redis:6379/0

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - ./redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
